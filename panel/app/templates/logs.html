{% extends "layout.html" %}

{% block title %}Logs - SetupOpenClaw{% endblock %}

{% block content %}
<div class="mb-6">
    <h1 class="text-3xl font-bold text-gray-800 mb-2">Installation Logs</h1>
    <p class="text-gray-600">Últimas 100 linhas do log de instalação</p>
</div>

<div class="bg-white p-6 rounded-lg shadow">
    <div class="flex justify-between items-center mb-4">
        <h3 class="font-bold text-lg">📋 /var/log/setup-openclaw/install.log</h3>
        <a href="/dashboard" class="text-blue-600 hover:text-blue-800">← Voltar ao Dashboard</a>
    </div>
    
    <pre class="terminal p-4 rounded overflow-auto max-h-screen text-sm">{{ log_content }}</pre>
</div>
{% endblock %}
