version: '3.8'

services:
  panel:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: setup-openclaw-panel
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - /root/setup-openclaw:/root/setup-openclaw:ro
      - /var/log/setup-openclaw:/var/log/setup-openclaw:rw
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - PANEL_USER=${PANEL_USER:-admin}
      - PANEL_PASSWORD=${PANEL_PASSWORD:-changeme}
      - SECRET_KEY=${SECRET_KEY:-changeme-in-production-please}
    networks:
      - panel-network

networks:
  panel-network:
    driver: bridge
